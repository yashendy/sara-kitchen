<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة المشتريات | مطبخ سارة</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <div class="container header-flex">
            <div class="logo-area">
                <img src="logo-sara-kitchen.png" alt="شعار مطبخ سارة" class="logo-img">
                <h1 class="logo-text">مطبخ سارة</h1>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">الرئيسية</a></li>
                    <li><a href="menu.html">القائمة</a></li>
                    <li><a href="track.html">تتبع طلبك</a></li>
                    <li><a href="cart.html" class="active cart-link">السلة 🛒</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container cart-container">
        <h2 class="section-title">سلة المشتريات</h2>
        
        <div class="cart-wrapper">
            <div class="cart-items" id="cart-items-container">
                </div>

            <div class="cart-summary">
                <h3>إتمام الطلب</h3>
                <form id="order-form">
                    <div class="form-group">
                        <label>الاسم بالكامل</label>
                        <input type="text" id="cust-name" required placeholder="أدخل اسمك">
                    </div>

                    <div class="form-group">
                        <label>رقم الهاتف</label>
                        <input type="tel" id="cust-phone" required placeholder="أدخل رقمك للتواصل">
                    </div>

                    <div class="form-group">
                        <label>طريقة الاستلام</label>
                        <select id="delivery-type" onchange="toggleDeliveryZones()">
                            <option value="DELIVERY">توصيل للمنزل 🚚</option>
                            <option value="PICKUP">استلام من المطبخ (مجاناً) 🏠</option>
                        </select>
                    </div>

                    <div class="form-group" id="zones-group">
                        <label>منطقة التوصيل</label>
                        <select id="delivery-zone" onchange="updateTotalWithDelivery()">
                            <option value="30">داخل المنطقة / منطقة قريبة (30 ج.م)</option>
                            <option value="50">منطقة بعيدة (50 ج.م)</option>
                            <option value="custom">محافظة أخرى (يحدد لاحقاً)</option>
                        </select>
                    </div>

                    <div class="form-group" id="address-group">
                        <label>العنوان بالتفصيل</label>
                        <textarea id="cust-address" placeholder="المنطقة، القطعة، الشارع، رقم المنزل..."></textarea>
                    </div>
                    
                    <hr>

                    <div class="total-area">
                        <div class="price-row">
                            <span>إجمالي الطلب:</span>
                            <span id="subtotal-price">0.00 ج.م</span>
                        </div>

                        <div class="price-row" id="delivery-row">
                            <span>رسوم التوصيل:</span>
                            <span id="delivery-cost">30.00 ج.م</span>
                        </div>

                        <div class="price-row total-final" style="border-top: 2px solid #eee; padding-top: 10px; margin-top: 10px;">
                            <strong>الإجمالي النهائي:</strong>
                            <strong id="total-price" style="font-size: 1.5rem; color: var(--secondary);">0.00 ج.م</strong>
                        </div>

                        <button type="submit" class="btn btn-primary btn-block" style="margin-top: 20px; font-size: 1.1rem;">
                            تأكيد الطلب الآن 🥘
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
