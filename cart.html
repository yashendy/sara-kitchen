<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة المشتريات | مطبخ سارة</title>
    <link rel="icon" type="image/png" href="logo-sara-kitchen.png">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/admin-dashboard.css"> <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .coupon-area { display: flex; gap: 10px; margin: 15px 0; }
        .coupon-area input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .discount-row { color: #10b981; font-weight: bold; display: none; } /* يظهر فقط عند تفعيل الكوبون */
        #coupon-msg { font-size: 0.85rem; margin-top: 5px; }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="container">
            <div class="logo">🍲 مطبخ سارة</div>
            <nav class="nav-links">
                <a href="index.html">الرئيسية</a>
                <a href="menu.html">القائمة</a>
                <a href="cart.html" class="active">السلة <span id="cart-count">0</span></a>
                <a href="track.html">تتبع طلب</a>
                <a href="admin-dashboard.html">لوحة الأدمن</a>
                <a href="admin-offers.html">العروض والولاء</a>
            </nav>
        </div>
    </header>

    <main class="container admin-main">
        <h2 class="section-title">سلة المشتريات</h2>
        
        <div class="cart-wrapper" style="display: grid; grid-template-columns: 1fr 350px; gap: 20px;">
            <div class="cart-items" id="cart-items-container">
                </div>

            <div class="cart-summary" style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                <h3>إتمام الطلب</h3>
                <form id="order-form">
                    <div class="form-group"><label>الاسم</label><input type="text" id="cust-name" required></div>
                    <div class="form-group"><label>الهاتف</label><input type="tel" id="cust-phone" required></div>
                    
                    <div class="form-group">
                        <label>طريقة الاستلام</label>
                        <select id="delivery-type" onchange="window.toggleDeliveryZones()">
                            <option value="DELIVERY">توصيل للمنزل</option>
                            <option value="PICKUP">استلام من المطبخ</option>
                        </select>
                    </div>

                    <div id="zones-group" class="form-group">
    <label>المنطقة</label>
    <select id="delivery-zone" onchange="window.updateTotalWithDelivery()">
        <option value="30">داخل المنطقة / قريبة (30 ج.م)</option>
        <option value="50">بعيدة (50 ج.م)</option>
        <option value="custom">محافظة أخرى (يحدد لاحقاً)</option>
    </select>
</div>

<div class="form-group" id="address-group">
    <label>العنوان بالتفصيل</label>
    <textarea id="cust-address" placeholder="المنطقة، الشارع، العمارة، رقم الشقة..."></textarea>
</div>

<div class="coupon-wrapper">
...

                    <div class="coupon-wrapper">
                        <label style="font-size: 0.9rem; font-weight: bold;">هل لديك كود خصم؟</label>
                        <div class="coupon-area">
                            <input type="text" id="coupon-input" placeholder="أدخل الكود هنا">
                            <button type="button" onclick="applyCoupon()" class="btn-secondary" style="white-space: nowrap;">تطبيق</button>
                        </div>
                        <div id="coupon-msg"></div>
                    </div>

                    <hr>
                    <div class="total-area">
                        <div class="price-row"><span>المشتريات:</span> <span id="subtotal-price">0.00 ج.م</span></div>
                        <div id="bulk-discount-row" style="display: none; color: #10b981; font-weight: bold; margin: 10px 0;">
                        🎉 خصم كبار العملاء: <span id="bulk-discount-val" dir="ltr">0</span> ج.م
                        </div>
                        <div class="price-row" id="delivery-row"><span>التوصيل:</span> <span id="delivery-cost">30.00 ج.م</span></div>
                        <div class="price-row discount-row" id="discount-display"><span>خصم الكوبون:</span> <span id="discount-amount">-0.00 ج.م</span></div>
                        <div class="price-row" style="font-size: 1.3rem; margin-top: 10px;">
                            <strong>الإجمالي:</strong> <strong id="total-price" style="color: var(--admin-primary);">0.00 ج.م</strong>
                        </div>
                        <div id="loyalty-box" style="background: #fef3c7; padding: 15px; border-radius: 8px; margin: 15px 0; border: 1px dashed #f59e0b;">
    <h4 style="margin-top: 0; color: #d97706;">⭐ هل أنت عميل مميز؟</h4>
    <div style="display: flex; gap: 10px; margin-top: 10px;">
        <input type="tel" id="loyalty-phone" placeholder="أدخل رقم هاتفك للتحقق من نقاطك" class="form-control" style="flex: 1; padding: 8px;">
        <button type="button" onclick="checkLoyaltyPoints()" class="btn-primary" style="background: #d97706; padding: 8px 15px; border:none; border-radius:5px; color:white; cursor:pointer;">تحقق</button>
    </div>
    <p id="loyalty-msg" style="font-size: 0.85rem; margin-top: 10px; font-weight: bold;"></p>
    
    <div id="use-points-section" style="display: none; margin-top: 10px;">
        <button type="button" onclick="applyLoyaltyPoints()" style="width: 100%; background: #10b981; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold;">استبدال النقاط بخصم 💰</button>
    </div>
</div>

<div id="loyalty-discount-row" style="display: none; color: #10b981; font-weight: bold; margin: 10px 0;">
    ⭐ خصم النقاط: <span id="loyalty-discount-val" dir="ltr">0</span> ج.م
</div>
                        <button type="submit" class="btn btn-primary btn-block" style="margin-top: 15px; width: 100%;">تأكيد الطلب 🥘</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
