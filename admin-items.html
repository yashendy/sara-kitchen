<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المنيو | مطبخ سارة</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="admin-body">

    <header class="main-header admin-header">
        <div class="container header-flex">
            <h2>إدارة قائمة الطعام</h2>
            <nav>
                <a href="admin-dashboard.html" class="btn-link">الطلبات</a>
                <button onclick="showAddItemForm()" class="btn btn-primary">+ إضافة وجبة جديدة</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <section id="add-item-modal" class="modal" style="display:none;">
            <div class="modal-content">
                <h3>إضافة وجبة جديدة</h3>
                <form id="add-product-form">
                    <div class="form-group">
                        <label>اسم الوجبة</label>
                        <input type="text" id="p-name" required>
                    </div>
                    <div class="form-group">
                        <label>الوصف</label>
                        <textarea id="p-desc" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>السعر (ج.م)</label>
                        <input type="number" id="p-price" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>رابط الصورة</label>
                        <input type="text" id="p-image" placeholder="ضع رابط صورة الوجبة هنا">
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">حفظ الوجبة</button>
                        <button type="button" onclick="hideAddItemForm()" class="btn btn-outline">إلغاء</button>
                    </div>
                </form>
            </div>
        </section>

        <div class="orders-table-wrapper" style="margin-top: 30px;">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>الصورة</th>
                        <th>الاسم</th>
                        <th>السعر</th>
                        <th>الحالة</th>
                        <th>إجراءات</th>
                    </tr>
                </thead>
                <tbody id="admin-products-list">
                    </tbody>
            </table>
        </div>
    </main>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/admin-items.js"></script>
</body>
</html>
