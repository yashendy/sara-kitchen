<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إدارة الأصناف - مطبخ سارة</title>

    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/admin-dashboard.css" />
    <style>
      .badge-offer { background: #fef3c7; color: #d97706; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; margin-right: 5px;}
      .badge-calories { color: #ef4444; font-size: 0.8rem; display: block; margin-top: 3px; }
      .badge-tags { color: #10b981; font-size: 0.8rem; display: block; margin-top: 2px; }
    </style>
  </head>

  <body data-page="admin-items">
    
    <header class="navbar">
        <div class="container">
            <div class="logo">
                <a href="index.html" style="text-decoration: none; color: inherit;">🍲 مطبخ سارة</a>
            </div>
            <nav class="nav-links">
                <a href="index.html">الرئيسية</a>
                <a href="menu.html">القائمة</a>
                <a href="cart.html" class="cart-link">السلة <span id="cart-count">0</span> 🛒</a>
                <a href="track.html">تتبع طلبك</a>
                <span style="color: #475569; margin: 0 10px;">|</span>
                <a href="admin-dashboard.html">الداشبورد</a>
                <a href="admin-orders.html">الطلبات</a>
                <a href="admin-items.html" class="active">الأصناف</a>
                <a href="admin-offers.html">العروض والولاء</a>
                <a href="admin-drivers.html">المندوبين</a>
            </nav>
        </div>
    </header>

    <main class="admin-main">
      <header class="admin-header">
        <h1 class="admin-page-title">إدارة الأصناف</h1>
        <p class="admin-page-subtitle">التحكم في الأصناف، الأسعار، التوافر، والبيانات الغذائية.</p>
      </header>

      <section class="admin-filters-bar">
        <div class="filters-group">
          <label for="item-search-input">بحث بالاسم:</label>
          <input type="text" id="item-search-input" placeholder="اكتبي جزء من اسم الصنف..." />
        </div>

        <div class="filters-group">
          <label for="item-category-filter">التصنيف:</label>
          <select id="item-category-filter"><option value="ALL">كل التصنيفات</option></select>
        </div>

        <div class="filters-group">
          <label for="item-availability-filter">التوافر:</label>
          <select id="item-availability-filter">
            <option value="ALL">الكل</option>
            <option value="AVAILABLE">متاح فقط</option>
            <option value="UNAVAILABLE">غير متاح فقط</option>
          </select>
        </div>

        <div class="filters-group" style="flex-direction: row; align-items: flex-end;">
          <button id="btn-add-item" class="btn-primary">+ إضافة صنف</button>
          <button id="btn-manage-categories" class="btn-secondary">إدارة التصنيفات</button>
        </div>
      </section>

      <section id="admin-items-container" class="admin-table-container">
        <p class="admin-orders-placeholder">جارٍ تحميل الأصناف...</p>
      </section>
    </main>

    <div class="admin-modal" id="itemModal" hidden>
      <div class="admin-modal-dialog" style="max-width: 600px;">
        <header class="admin-modal-header">
          <h3 class="admin-modal-title" id="itemModalTitle">إضافة / تعديل صنف</h3>
          <button id="closeItemModalX" class="admin-modal-close">×</button>
        </header>
        <div class="admin-modal-body">
          <form id="itemForm" class="admin-form">
            
            <div class="form-row" style="display: flex; gap: 15px;">
              <div style="flex: 2;">
                <label for="itemName">اسم الصنف</label>
                <input type="text" id="itemName" required />
              </div>
              <div style="flex: 1;">
                <label for="itemPrice">السعر (ج.م)</label>
                <input type="number" id="itemPrice" min="0" step="0.5" required />
              </div>
            </div>

            <div class="form-row">
              <label for="itemCategory">التصنيف</label>
              <select id="itemCategory" required><option value="">اختاري التصنيف</option></select>
            </div>

            <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 15px 0;">
            <h4 style="margin-bottom: 10px; color: #475569;">بيانات إضافية وغذائية</h4>

            <div class="form-row" style="display: flex; gap: 15px;">
              <div style="flex: 1;">
                <label for="itemCalories">السعرات (🔥)</label>
                <input type="number" id="itemCalories" placeholder="مثال: 250" min="0" />
              </div>
              <div style="flex: 2;">
                <label for="itemTags">كلمات دلالية (🍃)</label>
                <input type="text" id="itemTags" placeholder="مثال: دايت, نباتي, بدون سكر" />
                <small style="color: #64748b;">افصلي بين الكلمات بفاصلة</small>
              </div>
            </div>

            <div class="form-row" style="display: flex; gap: 20px; margin-top: 15px; background: #f8fafc; padding: 10px; border-radius: 8px;">
              <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                <input type="checkbox" id="itemInstant" style="width: auto;" /> فوري ⚡
              </label>
              <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                <input type="checkbox" id="itemInOffer" style="width: auto;" /> في العرض 🏷️
              </label>
              <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                <input type="checkbox" id="itemAvailable" checked style="width: auto;" /> متاح للطلب ✅
              </label>
            </div>

            <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 15px 0;">

            <div class="form-row">
              <label>صورة الصنف</label>
              <div class="image-input-wrapper" style="display: flex; gap: 10px; align-items: center;">
                <button type="button" id="itemImageBtn" class="btn-secondary">اختيار صورة</button>
                <span id="itemImageFileName" style="font-size: 0.9rem; color: #64748b;">لم يتم اختيار صورة</span>
              </div>
              <div id="itemImagePreview" class="image-preview" style="margin-top: 10px;" hidden>
                <img src="" alt="صورة الصنف" style="max-width: 100px; border-radius: 8px;" />
              </div>
              <input type="file" id="itemImageInput" accept="image/*" hidden />
            </div>

            <div class="form-row"><p id="itemFormMessage" style="color: red;"></p></div>
          </form>
        </div>
        <footer class="admin-modal-footer">
          <button class="btn-secondary" id="cancelItemModalBtn">إلغاء</button>
          <button class="btn-primary" id="saveItemBtn">حفظ الصنف</button>
        </footer>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/admin-items.js"></script>
  </body>
</html>
