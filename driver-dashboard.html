<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة المندوب | مطبخ سارة</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .driver-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); border-right: 6px solid #8b5cf6; }
        .order-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 15px; }
        .payment-badge { background: #ecfdf5; color: #059669; padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; border: 1px solid #a7f3d0;}
        .commission-badge { background: #e0e7ff; color: #4f46e5; padding: 4px 8px; border-radius: 6px; font-size: 0.8rem; font-weight: bold;}
        .items-box { background: #f8fafc; padding: 10px; border-radius: 8px; margin: 10px 0; font-size: 0.9rem; color: #475569;}
        .btn-call { display: flex; justify-content: center; align-items: center; gap: 8px; background: #eff6ff; color: #2563eb; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-bottom: 15px; border: 1px solid #bfdbfe; transition: 0.3s;}
        .btn-call:active { background: #dbeafe; }
        .btn-deliver { background: #10b981; color: white; width: 100%; padding: 15px; font-size: 1.1rem; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body class="admin-body">

    <header class="main-header" style="background: var(--secondary); color: white;">
        <div class="container header-flex">
            <h2>محفظة المندوب 🛵</h2>
            <button onclick="logout()" class="btn-logout" style="background:#ef4444; color:white; border:none; padding:6px 12px; border-radius:6px; font-weight:bold;">خروج</button>
        </div>
    </header>

    <main class="container">
        <div class="admin-stats" style="margin-top: 20px;">
            <div class="stat-card" style="background: white; border-bottom: 4px solid #10b981;">
                <h4 id="wallet-total" style="color: #10b981;">0 ج.م</h4>
                <p>كاش معاك (إجمالي)</p>
            </div>
            <div class="stat-card" style="background: white; border-bottom: 4px solid #3b82f6;">
                <h4 id="wallet-earnings" style="color: #3b82f6;">0 ج.م</h4>
                <p>عمولتك (مكسبك)</p>
            </div>
            <div class="stat-card" style="background: white; border-bottom: 4px solid #f59e0b;">
                <h4 id="wallet-net" style="color: #f59e0b;">0 ج.م</h4>
                <p>صافي للمطبخ</p>
            </div>
        </div>

        <h3 class="section-title" style="margin-top: 30px;">طلبات بانتظار التوصيل</h3>
        <div id="driver-orders-list">
            </div>
    </main>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/driver.js"></script>
</body>
</html>
