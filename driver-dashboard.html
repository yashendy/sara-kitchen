<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة المندوب | مطبخ سارة</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="admin-body">

    <header class="main-header" style="background: var(--secondary); color: white;">
        <div class="container header-flex">
            <h2>محفظة المندوب 🛵</h2>
            <button onclick="logout()" class="btn-logout" style="background:#c0392b">خروج</button>
        </div>
    </header>

    <main class="container">
        <div class="admin-stats" style="margin-top: 20px;">
            <div class="stat-card">
                <h4 id="wallet-total">0 ج.م</h4>
                <p>كاش معاك (إجمالي)</p>
            </div>
            <div class="stat-card" style="border-bottom-color: var(--primary);">
                <h4 id="wallet-earnings">0 ج.م</h4>
                <p>عمولتك (مكسبك)</p>
            </div>
            <div class="stat-card" style="border-bottom-color: #e67e22;">
                <h4 id="wallet-net">0 ج.م</h4>
                <p>صافي للمطبخ</p>
            </div>
        </div>

        <h3 class="section-title">طلبات بانتظار التوصيل</h3>
        <div id="driver-orders-list">
            </div>
    </main>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/driver.js"></script>
</body>
</html>
