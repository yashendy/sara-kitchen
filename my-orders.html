<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلباتي | مطبخ سارة</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .my-orders-container { max-width: 800px; margin: 40px auto; padding: 0 20px; min-height: 60vh; }
        .search-box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; text-align: center; }
        .search-box input { width: 100%; max-width: 400px; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1.1rem; margin-bottom: 15px; font-family: inherit; text-align: center; }
        .search-box input:focus { outline: none; border-color: #d97706; }
        
        .history-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; transition: transform 0.2s; }
        .history-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .history-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; padding-bottom: 15px; margin-bottom: 15px; }
        .history-date { color: #64748b; font-size: 0.9rem; }
        
        .history-items { margin-bottom: 15px; font-size: 0.95rem; color: #334155; line-height: 1.6; }
        
        .history-footer { display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 12px; border-radius: 8px; }
        .history-total { font-weight: bold; font-size: 1.1rem; color: #0f172a; }
        
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; }
        .bg-PENDING { background: #fef3c7; color: #d97706; }
        .bg-PREPARING { background: #dbeafe; color: #2563eb; }
        .bg-WITH_DRIVER { background: #ede9fe; color: #7c3aed; }
        .bg-DELIVERED { background: #d1fae5; color: #059669; }
        
        .btn-reorder { background: #d97706; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-family: inherit; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 5px; }
        .btn-reorder:hover { background: #b45309; }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="container">
            <div class="logo">
                <a href="index.html" style="text-decoration: none; color: inherit;">🍲 مطبخ سارة</a>
            </div>
            <nav class="nav-links">
                <a href="index.html">الرئيسية</a>
                <a href="menu.html">القائمة</a>
                <a href="my-orders.html" class="active">طلباتي</a>
                <a href="cart.html" class="cart-link">السلة <span id="cart-count">0</span> 🛒</a>
            </nav>
        </div>
    </header>

    <main class="my-orders-container">
        <h2 style="text-align: center; margin-bottom: 20px; color: #0f172a;">سجل طلباتك السابقة 📜</h2>
        
        <div class="search-box">
            <p style="margin-bottom: 10px; color: #475569;">أدخل رقم هاتفك لاستعراض طلباتك السابقة وإعادة طلبها بسهولة.</p>
            <input type="tel" id="phone-input" placeholder="مثال: 01012345678">
            <br>
            <button class="btn-primary" onclick="fetchMyOrders()">عرض طلباتي</button>
        </div>

        <div id="orders-results">
            </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/my-orders.js"></script>
</body>
</html>
